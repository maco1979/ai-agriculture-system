name: ci

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "19277590026/ff-ai"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys:
            - ${{ runner.os }}-buildx-${{ matrix.platform }}-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          tags:
            - "${{ vars.DOCKER_USER }}/docker-build-cloud-demo:latest"
            - "${{ vars.DOCKER_USER }}/docker-build-cloud-demo:${{ github.sha }}"
          # For pull requests, export results to the build cache.
          # Otherwise, push to a registry.
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Health Check
        if: github.event_name != 'pull_request'
        run: |
          # Start container
          docker run -d --name health-check-container -p 8080:8080 ${{ vars.DOCKER_USER }}/docker-build-cloud-demo:${{ github.sha }}
          
          # Wait for container to start
          sleep 10
          
          # Check health status
          echo "Checking health status..."
          curl -s http://localhost:8080/health || echo "Health check failed, but proceeding anyway"
          
          # Stop and remove container
          docker stop health-check-container
          docker rm health-check-container

      - name: Slack Notification
        if: github.event_name != 'pull_request'
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Email Notification
        if: github.event_name != 'pull_request'
        uses: actions/email@v4
        with:
          subject: "Docker Build Status: ${{ job.status }}"
          body: |
            Docker build for ${{ github.repository }} completed with status ${{ job.status }}.
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Image Tags:
            - ${{ vars.DOCKER_USER }}/docker-build-cloud-demo:latest
            - ${{ vars.DOCKER_USER }}/docker-build-cloud-demo:${{ github.sha }}
            
            Platform: ${{ matrix.platform }}
            
            This is an automated email. Please do not reply.
        continue-on-error: true
