name: Deploy to Volcengine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: cr.volcengine.com/ai-agriculture
  ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Volcengine Container Registry
      uses: docker/login-action@v2
      with:
        registry: cr.volcengine.com
        username: volcen
        password: ${{ secrets.VOLCENGINE_REGISTRY_PASSWORD }}
        
    - name: Build and push backend-core
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/backend-core:latest
          ${{ env.REGISTRY }}/backend-core:${{ github.sha }}
          
    - name: Build and push frontend-web
      uses: docker/build-push-action@v4
      with:
        context: ./microservices/frontend-web
        file: ./microservices/frontend-web/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/frontend-web:latest
          ${{ env.REGISTRY }}/frontend-web:${{ github.sha }}
      continue-on-error: true
      
    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
        
    - name: Deploy to VKE
      run: |
        kubectl apply -f volcengine-deployment.yaml
        kubectl rollout status deployment/backend-core -n ai-agriculture
        kubectl rollout status deployment/frontend-web -n ai-agriculture
