name: Security Scan

on:
  schedule:
    - cron: "0 2 * * 1"   # 每周一凌晨 2 点自动扫描
  workflow_dispatch:       # 支持手动触发
  push:
    branches: [ main ]
    paths:
      - "backend/requirements.txt"
      - "decision-service/requirements.txt"
      - "backend/src/**"
      - "decision-service/src/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  bandit-scan:
    name: "bandit — Static Analysis"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (all severity levels)
        run: |
          bandit -r backend/src decision-service/src \
            -f json \
            -o bandit-full-report.json \
            -l \
            --severity-level low \
            || true

      - name: Parse and report bandit results
        run: |
          python - <<'EOF'
          import json, sys

          try:
              data = json.load(open("bandit-full-report.json"))
          except Exception as e:
              print(f"[WARN] Could not parse bandit report: {e}")
              sys.exit(0)

          results = data.get("results", [])
          by_severity = {"HIGH": [], "MEDIUM": [], "LOW": []}
          for r in results:
              sev = r.get("issue_severity", "LOW").upper()
              by_severity.setdefault(sev, []).append(r)

          print("=" * 60)
          print("  BANDIT SECURITY SCAN RESULTS")
          print("=" * 60)

          for sev in ["HIGH", "MEDIUM", "LOW"]:
              items = by_severity.get(sev, [])
              icon = {"HIGH": "❌", "MEDIUM": "⚠️", "LOW": "ℹ️"}[sev]
              print(f"\n{icon} {sev}: {len(items)} issue(s)")
              for item in items[:10]:
                  print(f"   [{item['test_id']}] {item['issue_text']}")
                  print(f"          {item['filename']}:{item['line_number']}")

          highs = by_severity["HIGH"]
          if highs:
              print(f"\n::error::Bandit found {len(highs)} HIGH severity issue(s) — MERGE BLOCKED")
              sys.exit(1)
          else:
              print(f"\n[OK] No HIGH severity issues found")
          EOF

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-full-report
          path: bandit-full-report.json
          retention-days: 30

  safety-check:
    name: "safety — Dependency Vulnerabilities"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install safety
        run: pip install safety

      - name: Run safety (backend)
        run: |
          safety check \
            -r backend/requirements.txt \
            --json \
            --output safety-backend.json \
            || true

      - name: Run safety (decision-service)
        run: |
          safety check \
            -r decision-service/requirements.txt \
            --json \
            --output safety-decision.json \
            || true

      - name: Parse safety results
        run: |
          python - <<'EOF'
          import json, sys, os

          total_critical_high = 0

          for report_file, service in [("safety-backend.json", "backend"),
                                        ("safety-decision.json", "decision-service")]:
              if not os.path.exists(report_file):
                  print(f"[SKIP] {report_file} not found")
                  continue
              try:
                  data = json.load(open(report_file))
                  vulns = data.get("vulnerabilities", [])
                  critical_high = [v for v in vulns
                                   if v.get("severity", "").upper() in ("CRITICAL", "HIGH")]
                  total_critical_high += len(critical_high)

                  print(f"\n{'─'*50}")
                  print(f"  {service} — {len(vulns)} vulnerability(s) total")
                  print(f"  CRITICAL/HIGH: {len(critical_high)}")
                  for v in critical_high[:5]:
                      print(f"    {v.get('package_name')} {v.get('affected_versions')}")
                      print(f"      {str(v.get('advisory', ''))[:120]}")
              except Exception as e:
                  print(f"[WARN] Could not parse {report_file}: {e}")

          if total_critical_high > 0:
              print(f"\n::error::safety found {total_critical_high} CRITICAL/HIGH vulnerability(s) — MERGE BLOCKED")
              sys.exit(1)
          else:
              print(f"\n[OK] No CRITICAL/HIGH dependency vulnerabilities found")
          EOF

      - name: Upload safety reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-reports
          path: |
            safety-backend.json
            safety-decision.json
          retention-days: 30

  security-summary:
    name: "Security Summary"
    runs-on: ubuntu-latest
    needs: [ bandit-scan, safety-check ]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## 🔒 Weekly Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| bandit (static analysis) | ${{ needs.bandit-scan.result == 'success' && '✅ Clean' || '❌ Issues found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| safety (dependency vulns) | ${{ needs.safety-check.result == 'success' && '✅ Clean' || '❌ Issues found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> HIGH/CRITICAL findings block merges. MEDIUM/LOW findings are reported only." >> $GITHUB_STEP_SUMMARY
