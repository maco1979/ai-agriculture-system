# ============================================================
# AI农业决策系统 - Docker Compose 配置
# 用法：docker compose up -d
# 或者：.\start-local.ps1（Windows） / bash start-local.sh（Linux/Mac）
# ============================================================

version: '3.9'

services:
  # ──────────────────────────────────────
  # 后端 FastAPI 服务
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agri-backend
    restart: unless-stopped
    env_file:
      - .env          # 用户填写的 API Key 从这里读取
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s     # AI 模型初始化需要更长时间
    networks:
      - ai-agri-net
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────
  # 前端 React + Nginx 服务
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-agri-frontend
    restart: unless-stopped
    ports:
      - "3000:80"     # 本地访问：http://localhost:3000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-agri-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────
  # Redis 缓存（用于会话/任务队列）
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-agri-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agri-net
    volumes:
      - redis-data:/data

networks:
  ai-agri-net:
    driver: bridge

volumes:
  backend-data:    # SQLite 数据库持久化
  backend-logs:
  redis-data:
