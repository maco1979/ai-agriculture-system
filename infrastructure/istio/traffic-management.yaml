# Istio流量管理配置

apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"

---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - api-gateway
  http:
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: api-gateway
        port:
          number: 8080

---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: edge-computing-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - api-gateway
  http:
  - match:
    - uri:
        prefix: /api/edge/
    route:
    - destination:
        host: edge-computing
        port:
          number: 8000

---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: decision-service-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - api-gateway
  http:
  - match:
    - uri:
        prefix: /api/decision/
    route:
    - destination:
        host: decision-service
        port:
          number: 8001

---

apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: default
spec:
  host: api-gateway
  subsets:
  - name: v1
    labels:
      version: v1
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      http:
        maxRequestsPerConnection: 100
        maxRetries: 3

---

apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: edge-computing-dr
  namespace: default
spec:
  host: edge-computing
  subsets:
  - name: v1
    labels:
      version: v1
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      http:
        maxRequestsPerConnection: 100
        maxRetries: 3

---

apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: decision-service-dr
  namespace: default
spec:
  host: decision-service
  subsets:
  - name: v1
    labels:
      version: v1
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      http:
        maxRequestsPerConnection: 100
        maxRetries: 3
