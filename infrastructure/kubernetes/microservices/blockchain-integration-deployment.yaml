apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-integration
  namespace: ai-platform
  labels:
    app: blockchain-integration
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blockchain-integration
  template:
    metadata:
      labels:
        app: blockchain-integration
    spec:
      containers:
      - name: blockchain-integration
        image: ai-platform/blockchain-integration:latest
        ports:
        - containerPort: 8003
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 60
          periodSeconds: 20
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: redis-url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: api-key
        - name: BLOCKCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: blockchain-api-key
        - name: DEBUG
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-integration
  namespace: ai-platform
spec:
  selector:
    app: blockchain-integration
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blockchain-integration-hpa
  namespace: ai-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blockchain-integration
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80