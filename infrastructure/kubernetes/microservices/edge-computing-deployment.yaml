apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-computing
  namespace: ai-platform
  labels:
    app: edge-computing
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge-computing
  template:
    metadata:
      labels:
        app: edge-computing
    spec:
      containers:
      - name: edge-computing
        image: ai-platform/edge-computing:latest
        ports:
        - containerPort: 8002
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 20
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: redis-url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: api-key
        - name: DEBUG
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: edge-computing
  namespace: ai-platform
spec:
  selector:
    app: edge-computing
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edge-computing-hpa
  namespace: ai-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-computing
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80