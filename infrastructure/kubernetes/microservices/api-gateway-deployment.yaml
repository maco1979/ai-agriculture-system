apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ai-platform
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ai-platform/api-gateway:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
        env:
        - name: BACKEND_CORE_URL
          value: "http://backend-core:8000"
        - name: DECISION_SERVICE_URL
          value: "http://decision-service:8001"
        - name: EDGE_COMPUTING_URL
          value: "http://edge-computing:8002"
        - name: BLOCKCHAIN_INTEGRATION_URL
          value: "http://blockchain-integration:8003"
        - name: MONITORING_SERVICE_URL
          value: "http://monitoring-service:8004"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: api-key
        - name: DEBUG
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ai-platform
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: ai-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80