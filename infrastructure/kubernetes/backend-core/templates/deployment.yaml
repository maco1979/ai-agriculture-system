apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend-core.fullname" . }}
  labels:
    {{- include "backend-core.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend-core.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "backend-core.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: NODE_ENV
              value: {{ .Values.config.server.environment }}
            - name: SERVER_HOST
              value: {{ .Values.config.server.host }}
            - name: SERVER_PORT
              value: "{{ .Values.config.server.port }}"
            - name: DATABASE_URL
              value: {{ .Values.config.database.url }}
            - name: REDIS_URL
              value: {{ .Values.config.redis.url }}
            - name: CORS_ORIGINS
              value: "{{ join "," .Values.config.cors.origins }}"
            - name: MONITORING_ENABLED
              value: "{{ .Values.config.monitoring.enabled }}"
            - name: PROMETHEUS_PORT
              value: "{{ .Values.config.monitoring.prometheusPort }}"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
