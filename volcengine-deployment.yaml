# =============================================================
# AI 农业平台 - 火山引擎 Kubernetes 部署清单
# 命名空间: ai-agriculture
# 镜像仓库: cr.volcengine.com/ai-agriculture
# =============================================================

# ── 命名空间 ────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: ai-agriculture
  labels:
    app: ai-agriculture
    managed-by: kubectl

---
# ── ConfigMap：应用配置 ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agriculture-config
  namespace: ai-agriculture
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  HOST: "0.0.0.0"
  PORT: "8000"
  REDIS_URL: "redis://ai-agriculture-redis:6379/0"
  BLOCKCHAIN_ENDPOINT: "http://localhost:7050"
  MODEL_PATH: "/app/models"
  CHECKPOINT_PATH: "/app/fine_tuning_checkpoints"
  ORGANIC_CORE_MODEL: "PPO-SelfEvolvingPolicy"
  ORGANIC_CORE_HIDDEN_DIMS: "256,512,256"
  ORGANIC_CORE_ACTION_DIM: "10"
  ORGANIC_CORE_STATE_DIM: "32"
  TIMESERIES_MODEL: "TimesNet"
  TIMESERIES_FORECAST_HORIZON: "72"
  TIMESERIES_LOOKBACK: "168"
  VISION_MODEL: "ResNet50"
  VISION_MODEL_CLASSES: "10"
  VISION_MODEL_INPUT_SIZE: "224"
  RISK_MODEL: "LightGBM"
  RISK_MODEL_N_ESTIMATORS: "500"
  RISK_MODEL_MAX_DEPTH: "6"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"

---
# ── Secret：敏感配置（base64占位，部署前需替换）─────────────────
# 生成方式: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: ai-agriculture-secrets
  namespace: ai-agriculture
type: Opaque
data:
  # echo -n "postgresql://ai_user:ai_password@ai-agriculture-postgres:5432/ai_platform" | base64
  database-url: cG9zdGdyZXNxbDovL2FpX3VzZXI6YWlfcGFzc3dvcmRAYWktYWdyaWN1bHR1cmUtcG9zdGdyZXM6NTQzMi9haV9wbGF0Zm9ybQ==
  # echo -n "change-this-in-production-32chars++" | base64
  secret-key: Y2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi0zMmNoYXJzKys=
  # echo -n "ai_password" | base64
  postgres-password: YWlfcGFzc3dvcmQ=

---
# ── Secret：镜像仓库认证 ─────────────────────────────────────────
# 由部署脚本通过 kubectl create secret docker-registry 创建
# 此处为占位，确保其他资源引用不报错
# 实际创建命令：
# kubectl create secret docker-registry registry-credentials \
#   --docker-server=cr.volcengine.com \
#   --docker-username=volcen \
#   --docker-password=<PASSWORD> \
#   -n ai-agriculture

---
# ── PersistentVolumeClaim：后端数据持久化 ───────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  namespace: ai-agriculture
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-disk-topology   # 火山引擎 VKE 默认 StorageClass
  resources:
    requests:
      storage: 50Gi

---
# ── PersistentVolumeClaim：PostgreSQL 数据持久化 ────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: ai-agriculture
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-disk-topology
  resources:
    requests:
      storage: 20Gi

---
# ══════════════════════════════════════════════════════════════
# Redis
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agriculture-redis
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agriculture
      component: redis
  template:
    metadata:
      labels:
        app: ai-agriculture
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agriculture-redis
  namespace: ai-agriculture
spec:
  selector:
    app: ai-agriculture
    component: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# ══════════════════════════════════════════════════════════════
# PostgreSQL
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agriculture-postgres
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agriculture
      component: postgres
  template:
    metadata:
      labels:
        app: ai-agriculture
        component: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "ai_platform"
        - name: POSTGRES_USER
          value: "ai_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ai-agriculture-secrets
              key: postgres-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "ai_user", "-d", "ai_platform"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "ai_user", "-d", "ai_platform"]
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agriculture-postgres
  namespace: ai-agriculture
spec:
  selector:
    app: ai-agriculture
    component: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
# ══════════════════════════════════════════════════════════════
# Backend Core（AI 农业平台核心服务）
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agriculture-backend
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agriculture
      component: backend
  template:
    metadata:
      labels:
        app: ai-agriculture
        component: backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z ai-agriculture-postgres 5432; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z ai-agriculture-redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: backend
        image: cr.volcengine.com/ai-agriculture/backend-core:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: ai-agriculture-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-agriculture-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ai-agriculture-secrets
              key: secret-key
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: backend-data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: models
          mountPath: /app/models
        - name: checkpoints
          mountPath: /app/fine_tuning_checkpoints
      volumes:
      - name: backend-data
        persistentVolumeClaim:
          claimName: backend-data-pvc
      - name: logs
        emptyDir: {}
      - name: models
        emptyDir: {}
      - name: checkpoints
        emptyDir: {}
      imagePullSecrets:
      - name: registry-credentials

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agriculture-backend
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: backend
spec:
  selector:
    app: ai-agriculture
    component: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-agriculture-backend-hpa
  namespace: ai-agriculture
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agriculture-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# ══════════════════════════════════════════════════════════════
# Frontend Web
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agriculture-frontend
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agriculture
      component: frontend
  template:
    metadata:
      labels:
        app: ai-agriculture
        component: frontend
    spec:
      containers:
      - name: frontend
        image: cr.volcengine.com/ai-agriculture/frontend-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          value: "http://ai-agriculture-backend:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      imagePullSecrets:
      - name: registry-credentials

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agriculture-frontend
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: frontend
spec:
  selector:
    app: ai-agriculture
    component: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
# ══════════════════════════════════════════════════════════════
# Ingress（火山引擎 VKE 使用 nginx ingress controller）
# ══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-agriculture-ingress
  namespace: ai-agriculture
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-agriculture-backend
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: ai-agriculture-backend
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: ai-agriculture-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-agriculture-frontend
            port:
              number: 80

---
# ══════════════════════════════════════════════════════════════
# API Gateway（可选微服务，存在 Dockerfile 时部署）
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agriculture-api-gateway
  namespace: ai-agriculture
  labels:
    app: ai-agriculture
    component: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agriculture
      component: api-gateway
  template:
    metadata:
      labels:
        app: ai-agriculture
        component: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: cr.volcengine.com/ai-agriculture/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
      imagePullSecrets:
      - name: registry-credentials

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agriculture-api-gateway
  namespace: ai-agriculture
spec:
  selector:
    app: ai-agriculture
    component: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
