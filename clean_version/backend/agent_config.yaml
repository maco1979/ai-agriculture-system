  weather_skill:
    module: "skills.weather_skill"
    class: "WeatherSkill"
    version: "1.0.0"
    status: "active"
    dependencies: ["aiohttp"]

  crop_skill:
    module: "skills.crop_skill"
    class: "CropSkill"
    version: "1.0.0"
    status: "active"
    dependencies: []

  pest_skill:
    module: "skills.pest_skill"
    class: "PestSkill"
    version: "1.0.0"
    status: "active"
    dependencies: []

  blockchain_skill:
    module: "skills.blockchain_skill"
    class: "BlockchainSkill"
    version: "1.0.0"
    status: "active"
    dependencies: []

  device_skill:
    module: "skills.device_skill"
    class: "DeviceSkill"
    version: "1.0.0"
    status: "active"
    dependencies: ["aiohttp"]

  nlp_skill:
    module: "skills.nlp_skill"
    class: "NLPSkill"
    version: "1.0.0"
    status: "active"  # 已实现（原: pending）
    dependencies: []

  recommendation_skill:
    module: "skills.recommendation_skill"
    class: "RecommendationSkill"
    version: "1.0.0"
    status: "active"  # 已实现（原: pending）
    dependencies: []

# ═══════════════════════════════════════════════════════════
#  全局配置
# ═══════════════════════════════════════════════════════════
global:
  log_level: "INFO"
  skill_timeout_seconds: 30
  max_concurrent_skills: 8
  health_check_interval_seconds: 60
  backup_enabled: true
  backup_interval_hours: 24

  monitoring:
    enabled: true
    metrics_collection: true
    alerting_enabled: true
    performance_thresholds:
      cpu_usage: "80%"
      memory_usage: "85%"
      response_time: "2000ms"

  security:
    authentication_required: true
    encryption_enabled: true
    audit_logging: true
    data_anonymization: false

# ═══════════════════════════════════════════════════════════
#  技能依赖关系
# ═══════════════════════════════════════════════════════════
skill_dependencies:
  orchestrator_agent:
    requires: []
    optional: []
    orchestrates: ["decision_engine_agent", "blockchain_agent",
                   "edge_computing_agent", "user_interaction_agent"]

  decision_engine_agent:
    requires: ["weather_skill", "crop_skill", "pest_skill"]
    optional: ["blockchain_skill"]

  blockchain_agent:
    requires: ["blockchain_skill"]
    optional: []

  edge_computing_agent:
    requires: ["device_skill"]
    optional: ["weather_skill"]

  user_interaction_agent:
    requires: ["nlp_skill", "recommendation_skill"]
    optional: ["crop_skill", "pest_skill"]

# ═══════════════════════════════════════════════════════════
#  初始化顺序（协调者最先，用户交互最后）
# ═══════════════════════════════════════════════════════════
initialization_order:
  - "global"
  - "orchestrator_agent"     # 协调者优先注册
  - "edge_computing_agent"   # 边缘计算次之（采集数据）
  - "blockchain_agent"       # 区块链服务
  - "decision_engine_agent"  # 决策引擎
  - "user_interaction_agent" # 用户接口最后

# ═══════════════════════════════════════════════════════════
#  测试配置
# ═══════════════════════════════════════════════════════════
testing:
  mock_mode: true
  test_data_path: "test_data/"
  skill_validation_enabled: true
  performance_testing_interval_hours: 24
  agent_integration_test: true  # 新增：启用多智能体集成测试
