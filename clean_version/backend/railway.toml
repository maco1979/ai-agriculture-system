[build]
builder = "nixpacks"
installCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60

# 环境变量将在Railway控制台中设置
# 需要设置以下变量：
# - DATABASE_URL
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - JWT_SECRET
# - ENVIRONMENT=production